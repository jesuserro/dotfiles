# Chezmoi: gestor único activo de dotfiles relevantes (MCP + SOPS/Age + zsh stack RC files).
# Ver docs/CHEZMOI.md para el alcance vigente.
#
# Do not hardcode [source].path here — use `chezmoi apply --source=<clone>` or
# set source in ~/.config/chezmoi/chezmoi.toml for machine-specific paths.

[data]
    # SOPS decrypt via run_after_00_gen_secrets.sh.tmpl (not Chezmoi sops template func).
    storeEtlProjectDir = "{{ .chezmoi.homeDir }}/proyectos/store-etl"

# Obsidian / mcpvault + Filesystem MCP whitelist (override in ~/.config/chezmoi/chezmoi.toml)
[data.ai]
    obsidian_vault_path = "/mnt/c/Users/jesus/Documents/vault_trabajo"
    excalidraw_workspace_host = "/mnt/c/Users/jesus/Documents/vault_trabajo/excalidraw"

# Codex agent preferences (override in ~/.config/chezmoi/chezmoi.toml per machine)
[data.codex]
    model = "gpt-5.5"
    model_reasoning_effort = "high"
    dotfiles_trust_level = "trusted"
