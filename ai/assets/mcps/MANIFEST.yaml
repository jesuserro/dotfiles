# Canonical MCP intent for Cursor, Codex, and OpenCode (global Chezmoi scope).
# Templates under dot_cursor/, dot_codex/, dot_config/opencode/ are NOT yet generated
# from this file; run `make ai-mcp-validate` to verify schema and policy.
#
# Codex plugin blocks (e.g. github@openai-curated) are out of scope here.

version: 1

policy:
  compatible_by_default_enabled: true
  summary: >
    Every compatible MCP is intended enabled on cursor, codex, and opencode.
    Missing services, secrets, binaries, or host paths are surfaced by readiness
    checks (WARN/MISSING/FAIL under STRICT), not by silently omitting servers.

# Reserved for future per-project or per-stack overlays (not used by the validator yet).
profiles:
  global:
    description: Chezmoi-managed global MCP intent (editor templates in this repo)
  store-etl: {}
  ixatu: {}
  project-local: {}

mcps:
  - id: excalidraw_canvas
    display_name: Excalidraw Canvas MCP
    description: Advanced Excalidraw canvas editing via upstream Docker stdio server
    layer: core
    category: diagrams
    runtime: docker
    surfaces:
      cursor: { enabled: true }
      codex: { enabled: true }
      opencode: { enabled: true }
    requires: [docker]
    secrets: []
    paths_probe: []
    notes: >
      Canonical runtime is yctimlin/mcp_excalidraw via Docker, launched
      ephemerally as the `excalidraw_canvas` MCP with `docker run -i --rm` by
      MCP clients. This intentionally avoids the generic `excalidraw` name,
      which some clients may reserve for simpler render-only integrations.
      The canvas runs separately on demand with `make excalidraw-start` using
      ghcr.io/yctimlin/mcp_excalidraw-canvas:latest; clients use
      ghcr.io/yctimlin/mcp_excalidraw:latest with
      EXPRESS_SERVER_URL=http://host.docker.internal:3210 and
      ENABLE_CANVAS_SYNC=true. The canvas host port is reserved as 3210
      (`3210:3000` Docker mapping) so Store ETL/Dagster can keep localhost:3000.
      Do not clone, npm install, pnpm install, or build a local dist/index.js
      for normal operation.

  - id: context7
    display_name: Context7
    description: Up-to-date library and framework documentation
    layer: core
    category: docs
    runtime: npx
    surfaces:
      cursor: { enabled: true }
      codex: { enabled: true }
      opencode: { enabled: true }
    requires: [npx, node]
    secrets: []
    paths_probe: []
    notes: Resolved at runtime via npx -y @upstash/context7-mcp

  - id: docker
    display_name: Docker MCP
    description: Docker Desktop MCP Gateway official stdio server
    layer: core
    category: containers
    runtime: docker
    surfaces:
      cursor: { enabled: true }
      codex: { enabled: true }
      opencode: { enabled: true }
    requires: [docker.exe]
    secrets: []
    paths_probe: []
    notes: >
      Use the official Docker Desktop MCP Gateway via `docker.exe mcp gateway
      run`. Use docker.exe from WSL because Linux docker CLI reports "Docker
      Desktop is not running" for MCP Toolkit, while Docker Engine still works.

  - id: grafana
    display_name: Grafana MCP
    description: Grafana dashboards, datasources, Explore, incidents
    layer: platform
    category: observability
    runtime: uvx
    surfaces:
      cursor: { enabled: true }
      codex: { enabled: true }
      opencode: { enabled: true }
    requires: [uvx, uv]
    secrets: []
    paths_probe: []
    notes: >
      Dev-oriented URLs and placeholder creds live in generated templates;
      production should override via env without committing secrets to the manifest.

  - id: opentelemetry
    display_name: OpenTelemetry MCP
    description: OTel semantic conventions and backends (e.g. Tempo)
    layer: platform
    category: observability
    runtime: uvx
    surfaces:
      cursor: { enabled: true }
      codex: { enabled: true }
      opencode: { enabled: true }
    requires: [uvx, uv]
    secrets: []
    paths_probe: []
    notes: Pinned extra package in templates; readiness should verify backend reachability.

  - id: github
    display_name: GitHub MCP
    description: GitHub API via codex-mcp-github wrapper
    layer: core
    category: scm
    runtime: bash
    surfaces:
      cursor: { enabled: true }
      codex: { enabled: true }
      opencode: { enabled: true }
    requires: [bash]
    secrets:
      - path: ~/.secrets/codex.env
        keys_hint: [GITHUB_PERSONAL_ACCESS_TOKEN, GITHUB_TOKEN]
    paths_probe:
      - ~/.local/bin/codex-mcp-github
    notes: >
      Wrapper sources codex.env and execs `npx -y
      @modelcontextprotocol/server-github`. Materialize the wrapper with
      `make install-mcp-github` (opt-in, idempotent, no sudo). Never store
      token values in this manifest.

