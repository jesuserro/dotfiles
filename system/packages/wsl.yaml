schema_version: 1
platform: wsl
manager: environment
packages:
  - package: wslpath
    command: wslpath
    required: true
    capability: interop
    install_method: builtin
    note: Required to translate Linux paths before invoking Windows-side commands.
  - package: powershell.exe
    command: powershell.exe
    required: false
    capability: windows
    install_method: windows
    note: Used by make update to launch Windows updates from WSL.
  - package: wt.exe
    command: wt.exe
    required: false
    capability: windows
    install_method: windows
    note: Used by make update to open a Windows Terminal tab for WinGet and WSL update.
  - package: winget.exe
    command: winget.exe
    required: false
    capability: windows
    install_method: windows
    note: Windows Package Manager on the host; exposed in PATH from WSL when available.
