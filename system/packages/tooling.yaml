schema_version: 1
platform: common
manager: external
packages:
  - package: chezmoi
    command: chezmoi
    required: true
    capability: bootstrap
    install_method: manual
    note: Required to apply managed dotfiles. Install via 'make install-chezmoi' (opt-in, idempotent, no sudo) or upstream get.chezmoi.io.
  - package: sops
    command: sops
    required: true
    capability: secrets
    install_method: manual
    note: SOPS+Age secrets manager. Not in Ubuntu APT repos; install via 'make install-sops' (opt-in, idempotent) or from https://github.com/getsops/sops/releases.
  - package: uv
    command: uv
    required: false
    capability: python
    install_method: manual
    note: Preferred Python tool (uv-first policy) for venvs and tool installs; install with 'make install-uv'. Stays optional so STRICT=1 does not break minimal machines.
  - package: node
    command: node
    required: false
    capability: js-toolchain
    install_method: manual
    note: Base JavaScript runtime; required de facto on workstation use (codex, gitnexus, npx-based MCPs) but not a uv dependency. Install with 'make install-node-stack' (opt-in, APT-only) or your distro's package manager. Stays optional so headless/CI machines do not fail.
  - package: npm
    command: npm
    required: false
    capability: js-toolchain
    install_method: manual
    note: Required de facto on workstation use (codex, gitnexus, corepack, npx-based MCPs); ships with Node. Install with 'make install-node-stack' (opt-in, APT-only). Independent of the uv-first Python policy.
  - package: corepack
    command: corepack
    required: false
    capability: js-toolchain
    install_method: manual
    note: Used by ups() to activate and synchronize pnpm.
  - package: pnpm
    command: pnpm
    required: false
    capability: js-toolchain
    install_method: corepack
    note: Used by ups() and auxiliary MCP repos such as excalidraw-mcp.
  - package: "@openai/codex"
    command: codex
    required: false
    capability: ai-cli
    install_method: npm
    note: Updated by ups() in the user npm prefix.
  - package: gitnexus
    command: gitnexus
    required: false
    capability: ai-cli
    install_method: npm
    note: GitNexus CLI is updated separately from the MCP launcher flow.
  - package: "@ast-grep/cli"
    command: ast-grep
    required: false
    capability: agent-validation
    install_method: npm
    note: Structured code search for agents; install with 'make install-agent-tools' and update with ups() through the user npm prefix.
  - package: actionlint
    command: actionlint
    required: false
    capability: agent-validation
    install_method: github-release
    note: GitHub Actions workflow validator; install with 'make install-agent-tools' from rhysd/actionlint releases with checksum verification.
  - package: osv-scanner
    command: osv-scanner
    required: false
    capability: security
    install_method: github-release
    note: Dependency vulnerability scanner; install with 'make install-agent-tools' from google/osv-scanner releases with checksum verification.
  - package: opencode
    command: opencode
    required: false
    capability: ai-cli
    install_method: curl
    note: Updated by ups() through the official install script.
  - package: gh
    command: gh
    required: false
    capability: git
    install_method: manual
    note: GitHub CLI; optional for gh-driven workflows from WSL.
  - package: docker
    command: docker
    required: false
    capability: containers
    install_method: manual
    note: Used by local aliases and WSL workstation container workflows.
  - package: azure-cli
    command: az
    required: false
    capability: azure
    install_method: manual
    note: Azure CLI is opt-in for Azure workstations; install manually with 'make install-azure-cli'. Not part of 'make install', and login remains manual with 'az login'.
