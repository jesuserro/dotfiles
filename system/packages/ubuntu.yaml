schema_version: 1
platform: ubuntu
manager: apt
packages:
  - package: build-essential
    command: gcc
    required: true
    capability: build
    note: Metapackage for compilers and libc dev headers used by native Python wheels and builds.
  - package: python3-venv
    command: python3
    required: true
    capability: python
    note: Ensures the venv module alongside python3; shares the python3 binary in PATH checks.
  - package: python3-pip
    command: pip3
    required: true
    capability: python
    note: Base Python package installer used by some local workflows.
  - package: pipx
    command: pipx
    required: true
    capability: python
    note: Preferred isolated installer for user-scoped Python CLI tools.
  - package: bubblewrap
    command: bwrap
    required: true
    capability: sandbox
    note: Required for Codex sandboxing to work cleanly on Linux and WSL.
  - package: age
    command: age
    required: true
    capability: secrets
    note: Used for SOPS age key management in this repo.
  - package: fd-find
    command: fdfind
    required: true
    capability: cli
    note: Debian/Ubuntu package that provides the fd-style file finder.
  - package: tree
    command: tree
    required: false
    capability: docs
    note: Used by scripts/treegen.sh to regenerate STRUCTURE.md.
  - package: zoxide
    command: zoxide
    required: false
    capability: shell
    note: Directory jumper; replaces OMZ plugin z. Install with make deps-install DEPS_INSTALL_ARGS=--include-optional.
  - package: shellcheck
    command: shellcheck
    required: true
    capability: linting
    note: Required by shell lint / make test-fast (make test-lint -> lint-shellcheck).
  - package: shfmt
    command: shfmt
    required: true
    capability: linting
    note: Required by shell format check / make test-fast (make test-lint -> lint-shfmt, make fmt-shell).
  - package: yamllint
    command: yamllint
    required: true
    capability: linting
    note: Validates repo YAML inventories, GitHub Actions workflows and SOPS metadata without touching Chezmoi templates.
  - package: gitleaks
    command: gitleaks
    required: true
    capability: security
    note: Scans the working tree for accidental plaintext secrets via make security-check.
  - package: bats
    command: bats
    required: true
    capability: testing
    note: Bats test runner required to validate the repo via make test-fast / make test-bats. Available in Ubuntu APT (pulls parallel + sysstat as deps).
